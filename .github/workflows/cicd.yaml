name: Run Tests in Container

on: [push]

jobs:
  # all:
  #   runs-on: ubuntu-latest
  #   name: all

  #   steps:
  #   - name: Checkout code
  #     uses: actions/checkout@v4

  #   - name: Run Unit Tests in Container
  #     run: |
  #       cd src/TheatreCenter
  #       docker compose up

  code-style:
    runs-on: ubuntu-latest
    name: Code analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dotnet tools
        run: dotnet tool restore
        working-directory: src/TheatreCenter

      - name: Restore dependencies
        run: dotnet restore TheatreCenter.sln
        working-directory: src/TheatreCenter

      - name: Check formatting
        run: dotnet format --verify-no-changes --no-restore
        working-directory: src/TheatreCenter

      - name: Build with analyzers
        run: dotnet build TheatreCenter.sln --no-restore
        working-directory: src/TheatreCenter

      - name: Run metrics (cyclomatic + Halstead)
        run: dotnet run --project tools/CodeQuality/TheatreCenter.CodeQuality.csproj -- --solution TheatreCenter.sln --config codequality.config.json --report artifacts/metrics.json
        working-directory: src/TheatreCenter

      - name: Run tests
        run: dotnet test TheatreCenter.sln --no-build --logger trx
        working-directory: src/TheatreCenter

      - name: Upload metrics report
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: src/TheatreCenter/artifacts/metrics.json
          if-no-files-found: ignore


  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: code-style
    if: needs.code-style.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Unit Tests in Container
      run: |
        cd src/TheatreCenter
        docker compose build unit-test-runner
        docker compose run --rm unit-test-runner

    - name: Upload Unit Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: src/TheatreCenter.UnitTests/unit-test-results/unit-tests.trx

  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: unit-tests
    if: needs.unit-tests.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start Database
      run: |
        cd src/TheatreCenter
        docker compose up -d db
        sleep 10

    - name: Run Integration Tests in Container
      run: |
        cd src/TheatreCenter
        docker compose build integration-test-runner
        docker compose run --rm integration-test-runner

    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: src/TheatreCenter.UnitTests/integration-test-results/integration-tests.trx

    - name: Stop Database
      if: always()
      run: |
        cd src/TheatreCenter
        docker compose down

  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: integration-tests
    if: needs.integration-tests.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start Database
      run: |
        cd src/TheatreCenter
        docker compose up -d db
        sleep 10

    - name: Run E2E Tests
      run: |
        cd src/TheatreCenter
        docker compose build e2e-test-runner
        docker compose run --rm e2e-test-runner

    - name: Upload E2E Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: src/TheatreCenter.UnitTests/e2e-test-results/e2e-tests.trx

    - name: Final Cleanup
      if: always()
      run: |
        cd src/TheatreCenter
        docker compose down -v

  test-report:
    runs-on: ubuntu-latest
    name: Test Report
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    
    steps:
    - name: Generate Test Summary
      run: |
        echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.integration-tests.result }}" == "success" ] || [ "${{ needs.integration-tests.result }}" == "failure" ]; then
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Integration Tests | skipped |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.e2e-tests.result }}" == "success" ] || [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| E2E Tests | skipped |" >> $GITHUB_STEP_SUMMARY
        fi