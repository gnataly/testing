name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      E2E_MAIL_USERNAME: ${{ secrets.E2E_MAIL_USERNAME }}
      E2E_MAIL_PASSWORD: ${{ secrets.E2E_MAIL_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Verify secrets
        run: |
          if [ -z "$E2E_MAIL_USERNAME" ] || [ -z "$E2E_MAIL_PASSWORD" ]; then
            echo "E2E_MAIL_USERNAME and E2E_MAIL_PASSWORD secrets are required"; exit 1;
          fi

      - name: Restore
        run: dotnet restore TheatreCenter.sln

      - name: Build
        run: dotnet build TheatreCenter.sln --no-restore

      - name: Run BDD E2E tests (2FA + lockout)
        run: dotnet test TheatreCenter.E2ETests/TheatreCenter.E2ETests.csproj --filter AuthFlowFeature --no-build
